window.onerror = function (msg, url, line, col, err) {

/**
 * "Juicy" 2048-style: lighter top → deeper bottom (ref: purple / lime / teal / pink / coral / …).
 * premium: thick gold border (logo tile / ultra tiles).
 * sparkleFrom: show corner glints (bioluminescent read for deep-sea).
 */
const TILE_COLORS = {
  /* 2 = cool “deep water” blue; 4 = bright yellow / gold (not red, so it won’t read as “danger”) */
  2:     { top: 0x7dd3fc, bottom: 0x0c4a6e, text: '#ffffff', edge: 0x031922 },
  4:     { top: 0xfff176, bottom: 0xca8a04, text: '#0a0a0a', edge: 0x3a2800 },
  8:     { top: 0xbaa0ff, bottom: 0x5b21b6, text: '#ffffff', edge: 0x1e0a3a },
  16:    { top: 0xd8f9a0, bottom: 0x4a7c16, text: '#0a0a0a', edge: 0x1a3008 },
  32:    { top: 0x6ee7d2, bottom: 0x0c7665, text: '#042f2a', edge: 0x04221e },
  64:    { top: 0xfb7eb8, bottom: 0x9d174d, text: '#ffffff', edge: 0x2d0518, sparkle: true },
  128:   { top: 0xff8f73, bottom: 0xbf2c1a, text: '#ffffff', edge: 0x2d0a04, sparkle: true },
  256:   { top: 0x9d9dff, bottom: 0x4338ca, text: '#ffffff', edge: 0x0f0a2e, sparkle: true },
  512:   { top: 0xccc3ff, bottom: 0x5b2fb8, text: '#ffffff', edge: 0x1a0a35, sparkle: true },
  1024:  { top: 0xffe45c, bottom: 0xca6b0a, text: '#0a0a0a', edge: 0x2d2004, sparkle: true },
  2048:  { top: 0xa68bff, bottom: 0x3c1367, text: '#ffffff', edge: 0x0f0520, premium: true, sparkle: true },
  4096:  { top: 0xffd147, bottom: 0xbc5000, text: '#0a0a0a', edge: 0x2a1400, premium: true, sparkle: true },
  8192:  { top: 0xff9f59, bottom: 0x9a3412, text: '#ffffff', edge: 0x1f0a04, premium: true, sparkle: true },
};

function tileColor(val) {
  if (TILE_COLORS[val]) return TILE_COLORS[val];
  return { top: 0x1e2b3a, bottom: 0x0f1520, text: '#e2e8f0', edge: 0x0a0a0a, sparkle: false, premium: false };
}

// ═══ Phaser UI helpers: gradients via lightweight canvas textures (no heavy DOM) ═══
function makeLinearGradientTexture(scene, key, w, h, colorStops) {
  if (scene.textures.exists(key)) return;
  const c = document.createElement('canvas');
  c.width = Math.ceil(w); c.height = Math.ceil(h);
  const ctx = c.getContext('2d');
  const g = ctx.createLinearGradient(0, 0, 0, h);
  colorStops.forEach((t, i) => g.addColorStop(i / (colorStops.length - 1), t));
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, w, h);
  scene.textures.addCanvas(key, c);
}

// ═══ Reusable Phaser UI components (containers + clean update methods) ═══
class StyledButton extends Phaser.GameObjects.Container {
  /**
   * Gradient-style button using a pre-made texture strip + shine overlay.
   * Hover: scale + outer glow; Active: press-in (gamepad-quality feedback).
   * Uses an explicit hit rect + press tracking so touch/mouse releases behave reliably.
   */
  constructor(scene, x, y, w, h, textureKey, label, textStyle, onRelease) {
    super(scene, x, y);
    this._w = w; this._h = h; this._cb = onRelease;
    this._baseScale = 1;
    this._pressed = false;

    const rr = Math.min(22, h * 0.28);
    this.plate = scene.add.graphics();
    this.plate.fillStyle(0x0e7490, 1);
    this.plate.fillRoundedRect(-w / 2, -h / 2, w, h, rr);
    this.plate.lineStyle(2, 0xa5f3fc, 0.95);
    this.plate.strokeRoundedRect(-w / 2, -h / 2, w, h, rr);

    this.bg = scene.add.image(0, 0, textureKey).setDisplaySize(w, h);
    this.shine = scene.add.graphics();
    this._drawShine(w, h);

    this.txt = scene.add.text(0, 0, label, textStyle).setOrigin(0.5);

    this.add([this.plate, this.bg, this.shine, this.txt]);
    const hit = new Phaser.Geom.Rectangle(-w / 2, -h / 2, w, h);
    this.setInteractive({
      hitArea: hit,
      hitAreaCallback: Phaser.Geom.Rectangle.Contains,
      useHandCursor: true,
    });

    this.on('pointerover', () => {
      if (this._pressed) return;
      scene.tweens.add({
        targets: this,
        scale: 1.06,
        duration: 120,
        ease: 'Cubic.easeOut',
      });
      this.bg.setTint(0xffffff);
    });
    this.on('pointerout', () => {
      if (this._pressed) return;
      scene.tweens.add({ targets: this, scale: 1, duration: 140, ease: 'Cubic.easeOut' });
      this.bg.clearTint();
    });
    this.on('pointerdown', () => {
      this._pressed = true;
      scene.tweens.add({ targets: this, scale: 0.94, duration: 70, ease: 'Cubic.easeInOut' });
      Sfx.tap();
    });
    this.on('pointerup', () => {
      if (!this._pressed) return;
      this._pressed = false;
      scene.tweens.add({ targets: this, scale: 1.02, duration: 90, yoyo: true, ease: 'Quad.easeOut' });
      this.bg.clearTint();
      if (this._cb) this._cb();
    });
    this.on('pointerupoutside', () => {
      if (!this._pressed) return;
      this._pressed = false;
      scene.tweens.killTweensOf(this);
      this.setScale(1);
      this.bg.clearTint();
    });
  }

  _drawShine(w, h) {
    const r = Math.min(18, h * 0.25);
    this.shine.clear();
    this.shine.fillStyle(0xffffff, 0.12);
    this.shine.fillRoundedRect(-w / 2 + 2, -h / 2 + 2, w - 4, h * 0.42, { tl: r, tr: r, bl: 0, br: 0 });
  }

  setLabel(t) { this.txt.setText(t); }
}

class AnimatedScore extends Phaser.GameObjects.Container {
  /** Smooth count-up / tween toward target score (arcade HUD feel). */
  constructor(scene, x, y, label, styleLabel, styleValue) {
    super(scene, x, y);
    this.displayed = 0;
    this.target = 0;
    this.label = scene.add.text(0, -22, label, styleLabel).setOrigin(0.5, 0.5);
    this.value = scene.add.text(0, 10, '0', styleValue).setOrigin(0.5, 0.5);
    this.add([this.label, this.value]);
    this.tween = null;
  }

  setTarget(n, pop = false) {
    this.target = n;
    if (this.tween) {
      this.scene.tweens.remove(this.tween);
      this.tween = null;
    }
    this.tween = this.scene.tweens.addCounter({
      from: this.displayed,
      to: n,
      duration: Math.min(450, 40 + Math.abs(n - this.displayed) * 4),
      ease: 'Cubic.easeOut',
      onUpdate: (tw) => {
        this.displayed = Math.round(tw.getValue());
        this.value.setText(`${this.displayed}`);
      },
      onComplete: () => {
        this.displayed = n;
        this.value.setText(`${n}`);
        this.tween = null;
      },
    });
    if (pop) {
      this.scene.tweens.add({
        targets: this.value,
        scale: 1.12,
        duration: 90,
        yoyo: true,
        ease: 'Quad.easeOut',
      });
    }
  }

  snap(n) {
    this.displayed = n;
    this.target = n;
    this.value.setText(`${n}`);
  }
}

class CircularSessionTimer extends Phaser.GameObjects.Container {
  /** Decorative + readable session clock; ring grows slowly (ambient, not fail-state). */
  constructor(scene, x, y, radius) {
    super(scene, x, y);
    this.r = radius;
    this.glow = scene.add.graphics();
    this.track = scene.add.graphics();
    this.arc = scene.add.graphics();
    this.text = scene.add.text(0, 0, '0:00', {
      fontFamily: Theme.fontDisplay,
      fontSize: '22px',
      color: Theme.hex.foam,
      fontStyle: '700',
    }).setOrigin(0.5);
    this.sub = scene.add.text(0, radius * 0.62, 'TIME', {
      fontFamily: Theme.fontUI,
      fontSize: '11px',
      color: '#7dd3fc',
      fontStyle: '700',
    }).setOrigin(0.5);
    this.add([this.glow, this.track, this.arc, this.text, this.sub]);
    this.start = scene.time.now;
    this._pulse = scene.tweens.add({
      targets: this,
      scale: 1.03,
      duration: 1400,
      yoyo: true,
      repeat: -1,
      ease: 'Sine.easeInOut',
    });
  }

  updateFromTime(now) {
    const sec = Math.floor((now - this.start) / 1000);
    const m = Math.floor(sec / 60);
    const s = sec % 60;
    this.text.setText(`${m}:${s.toString().padStart(2, '0')}`);
    // Ring progress: 60s = full loop (repeating visual rhythm)
    const p = (sec % 60) / 60;
    this._drawRing(p);
  }

  _drawRing(progress) {
    const r = this.r;
    this.glow.clear();
    this.glow.lineStyle(10, C.primary, 0.08);
    this.glow.strokeCircle(0, 0, r + 2);

    this.track.clear();
    this.track.lineStyle(7, C.border, 0.55);
    this.track.beginPath();
    this.track.arc(0, 0, r, 0, Math.PI * 2, false);
    this.track.strokePath();

    this.arc.clear();
    this.arc.lineStyle(7, C.accent, 0.95);
    this.arc.beginPath();
    this.arc.arc(0, 0, r, -Math.PI / 2, -Math.PI / 2 + Math.PI * 2 * progress, false);
    this.arc.strokePath();
  }
}

class DepthMeter extends Phaser.GameObjects.Container {
  /**
   * "Hull integrity / depth pressure" style bar: maps highest tile toward 2048.
   * Color shifts cyan → mint → gold as you approach the surface (win tile).
   */
  constructor(scene, x, y, width, height) {
    super(scene, x, y);
    this._displayP = 0;
    this.w = width; this.h = height;
    this.back = scene.add.graphics();
    this.fill = scene.add.graphics();
    this.shine = scene.add.graphics();
    this.icon = scene.add.text(-width / 2 + 18, 0, '◇', {
      fontSize: '20px',
      color: '#67e8f9',
    }).setOrigin(0.5);
    this.label = scene.add.text(0, -height / 2 - 28, 'ASCENT', {
      fontFamily: Theme.fontUI,
      fontSize: '12px',
      color: '#7dd3fc',
      fontStyle: '700',
    }).setOrigin(0.5, 1);
    this.add([this.back, this.fill, this.shine, this.icon, this.label]);
    this.progress = 0;
    this._tween = null;
    this._redraw();
  }

  setProgress01(p, sceneRef) {
    this.progress = Phaser.Math.Clamp(p, 0, 1);
    if (this._tween) {
      this._tween.remove();
      this._tween = null;
    }
    // addCounter: tweening custom _displayP on a Container can break TweenData (this.callback) in Phaser 3.80
    this._tween = sceneRef.tweens.addCounter({
      from: this._displayP,
      to: this.progress,
      duration: 280,
      ease: 'Cubic.easeOut',
      onUpdate: (t) => {
        this._displayP = t.getValue();
        this._redraw();
      },
      onComplete: () => {
        this._displayP = this.progress;
        this._redraw();
        this._tween = null;
      },
    });
  }

  _redraw() {
    const w = this.w, h = this.h, p = this._displayP;
    const fillW = Math.max(8, (w - 16) * p);
    this.back.clear();
    this.back.fillStyle(C.surface, 1);
    this.back.fillRoundedRect(-w / 2, -h / 2, w, h, h / 2);
    this.back.lineStyle(1, C.border, 0.6);
    this.back.strokeRoundedRect(-w / 2, -h / 2, w, h, h / 2);

    const r = Math.round(Phaser.Math.Linear(34, 251, p));
    const g = Math.round(Phaser.Math.Linear(211, 191, p));
    const b = Math.round(Phaser.Math.Linear(238, 36, p));
    const hx = Phaser.Display.Color.GetColor(r, g, b);

    this.fill.clear();
    this.fill.fillStyle(hx, 1);
    this.fill.fillRoundedRect(-w / 2 + 4, -h / 2 + 4, fillW, h - 8, (h - 8) / 2);

    this.shine.clear();
    this.shine.fillStyle(0xffffff, 0.14);
    this.shine.fillRoundedRect(-w / 2 + 6, -h / 2 + 5, Math.max(0, fillW - 12), (h - 10) * 0.35, 6);
  }
}

const Sfx = {
  ctx: null, muted: false,
  init(){ try{ this.ctx = new(window.AudioContext||window.webkitAudioContext)(); }catch(e){} },
  _p(freq, dur, type='sine', vol=0.22){
    if(this.muted || !this.ctx) return;
    try{
      const o = this.ctx.createOscillator(), g = this.ctx.createGain();
      o.connect(g); g.connect(this.ctx.destination);
      o.type = type; o.frequency.value = freq;
      g.gain.setValueAtTime(vol, this.ctx.currentTime);
      g.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + dur);
      o.start(); o.stop(this.ctx.currentTime + dur);
    }catch(e){}
  },
  tap()     { this._p(800, 0.04, 'sine', 0.14); },
  slide()   { this._p(280, 0.08, 'sine', 0.16); },
  merge()   { this._p(440, 0.15, 'sine', 0.18); setTimeout(()=> this._p(660, 0.12, 'sine', 0.14), 60); },
  invalid() { this._p(140, 0.1, 'triangle', 0.10); },
  undo()    { this._p(500, 0.06, 'sine', 0.14); setTimeout(()=> this._p(380, 0.07, 'sine', 0.12), 60); },
  victory() { [392,523,659,784,1047].forEach((f,i)=> setTimeout(()=>this._p(f,0.35,'sine',0.16), i*130)); },
  gameOver(){ this._p(260, 0.25, 'triangle', 0.14); setTimeout(()=>this._p(180, 0.35, 'triangle', 0.10), 220); },
  bubble()  { this._p(Phaser.Math.Between(900,1400), 0.04, 'sine', 0.06); },
};

const Save = {
  KEY: '2048_deepsea_v2_ui',
  data: null,
  load(){
    try { this.data = JSON.parse(localStorage.getItem(this.KEY)) || JSON.parse(localStorage.getItem('2048_deepsea_v1')) || this.fresh(); }
    catch(e) { this.data = this.fresh(); }
  },
  fresh(){ return { bestScore: 0, sound: true, gamesPlayed: 0 }; },
  write(){
    try { localStorage.setItem(this.KEY, JSON.stringify(this.data)); }
    catch(e) {}
  },
};

/** Map Phaser Y into `.gp-stage` pixels (handles Scale.FIT letterboxing inside the canvas). */
function layoutDomStartButton() {
  const game = window.game;
  const btn = document.getElementById('gp-start-btn');
  const stage = document.querySelector('.gp-stage');
  const host = document.getElementById('game-canvas-host');
  if (!btn || !stage || !host) return;
  const canvas = host.querySelector('canvas');
  if (!canvas) return;
  const stageRect = stage.getBoundingClientRect();
  const canvasRect = canvas.getBoundingClientRect();
  const gw = game?.scale?.gameSize?.width || GW;
  const gh = game?.scale?.gameSize?.height || GH;
  const scale = Math.min(canvasRect.width / gw, canvasRect.height / gh);
  const drawnH = gh * scale;
  const offY = (canvasRect.height - drawnH) / 2;
  const yInCanvas = offY + (MENU_DOM_START_Y / gh) * drawnH;
  const topPx = canvasRect.top - stageRect.top + yInCanvas;
  btn.style.top = `${Math.round(topPx)}px`;
  btn.style.left = '50%';
  btn.style.transform = 'translate(-50%, -50%)';
}

/** DOM `<button id="gp-start-btn">` — real CSS control over the canvas (menu only). */
function setDomStartButtonVisible(show) {
  const el = document.getElementById('gp-start-btn');
  if (!el) return;
  el.classList.toggle('gp-start-btn--show', !!show);
  if (show) {
    el.removeAttribute('hidden');
    el.setAttribute('aria-hidden', 'false');
    el.disabled = false;
    requestAnimationFrame(() => {
      requestAnimationFrame(layoutDomStartButton);
    });
  } else {
    el.setAttribute('hidden', '');
    el.setAttribute('aria-hidden', 'true');
    el.disabled = true;
  }
}

let _menuDomStartLock = false;
function tryStartGameFromDomButton() {
  const g = window.game;
  if (!g?.scene || _menuDomStartLock) return;
  const menu = g.scene.getScene('Menu');
  if (!menu?.scene?.isActive()) return;
  _menuDomStartLock = true;
  const btn = document.getElementById('gp-start-btn');
  if (btn) btn.disabled = true;
  Sfx.tap();
  menu.cameras.main.fadeOut(350, 0, 0, 0);
  menu.cameras.main.once('camerafadeoutcomplete', () => {
    _menuDomStartLock = false;
    menu.scene.start('Game');
  });
}

const GRID_SIZE = 4;

function emptyGrid() {
  return Array.from({length: GRID_SIZE}, () => Array(GRID_SIZE).fill(0));
}
function cloneGrid(g) { return g.map(r => [...r]); }

function emptyCells(grid) {
  const cells = [];
  for(let r=0; r<GRID_SIZE; r++)
    for(let c=0; c<GRID_SIZE; c++)
      if(grid[r][c] === 0) cells.push({r, c});
  return cells;
}

function addRandom(grid) {
  const free = emptyCells(grid);
  if(free.length === 0) return false;
  const cell = free[Math.floor(Math.random() * free.length)];
  grid[cell.r][cell.c] = Math.random() < 0.9 ? 2 : 4;
  return cell;
}

function canMove(grid) {
  for(let r=0; r<GRID_SIZE; r++)
    for(let c=0; c<GRID_SIZE; c++){
      if(grid[r][c] === 0) return true;
      if(c < GRID_SIZE-1 && grid[r][c] === grid[r][c+1]) return true;
      if(r < GRID_SIZE-1 && grid[r][c] === grid[r+1][c]) return true;
    }
  return false;
}

function hasWon(grid) {
  for(let r=0; r<GRID_SIZE; r++)
    for(let c=0; c<GRID_SIZE; c++)
      if(grid[r][c] >= 2048) return true;
  return false;
}

/**
 * Same merge / score rules as classic 2048, plus per-tile tracks for slide animation.
 * `tracks`: { fromIdx, toIdx, val } in line order (before padding); map to board coords in moveGrid.
 */
function slideRowTracked(line) {
  const arr = line.filter(v => v !== 0);
  const fromIdx = [];
  for (let j = 0; j < GRID_SIZE; j++) if (line[j] !== 0) fromIdx.push(j);
  let score = 0;
  const merges = [];
  const tracks = [];
  for (let i = 0; i < arr.length - 1; i++) {
    if (arr[i] === arr[i + 1]) {
      const toIdx = i;
      tracks.push({ fromIdx: fromIdx[i], toIdx, val: arr[i] });
      tracks.push({ fromIdx: fromIdx[i + 1], toIdx, val: arr[i + 1] });
      arr[i] *= 2;
      score += arr[i];
      merges.push(toIdx);
      arr.splice(i + 1, 1);
      fromIdx.splice(i + 1, 1);
    }
  }
  while (arr.length < GRID_SIZE) arr.push(0);
  const moved = !line.every((v, i) => v === arr[i]);
  return { row: arr, score, moved, merges, tracks };
}

function moveGrid(grid, dir) {
  let score = 0, moved = false;
  const newGrid = emptyGrid();
  const mergedCells = [];
  const tracks = [];
  for (let i = 0; i < GRID_SIZE; i++) {
    const line = [];
    for (let j = 0; j < GRID_SIZE; j++) {
      switch (dir) {
        case 'left':  line.push(grid[i][j]); break;
        case 'right': line.push(grid[i][GRID_SIZE - 1 - j]); break;
        case 'up':    line.push(grid[j][i]); break;
        case 'down':  line.push(grid[GRID_SIZE - 1 - j][i]); break;
      }
    }
    const result = slideRowTracked(line);
    score += result.score;
    if (result.moved) moved = true;
    for (const tr of result.tracks) {
      let sr, sc, er, ec;
      const { fromIdx, toIdx, val } = tr;
      switch (dir) {
        case 'left':
          sr = i; sc = fromIdx; er = i; ec = toIdx; break;
        case 'right':
          sr = i; sc = GRID_SIZE - 1 - fromIdx; er = i; ec = GRID_SIZE - 1 - toIdx; break;
        case 'up':
          sr = fromIdx; sc = i; er = toIdx; ec = i; break;
        case 'down':
          sr = GRID_SIZE - 1 - fromIdx; sc = i; er = GRID_SIZE - 1 - toIdx; ec = i; break;
        default: continue;
      }
      tracks.push({ sr, sc, er, ec, val });
    }
    for (let j = 0; j < GRID_SIZE; j++) {
      let r, c;
      switch (dir) {
        case 'left':  r = i; c = j; break;
        case 'right': r = i; c = GRID_SIZE - 1 - j; break;
        case 'up':    r = j; c = i; break;
        case 'down':  r = GRID_SIZE - 1 - j; c = i; break;
      }
      newGrid[r][c] = result.row[j];
      if (result.merges.includes(j)) mergedCells.push({ r, c });
    }
  }
  return { grid: newGrid, score, moved, mergedCells, tracks };
}

function spawnBubbles(scene, count=12, depth=1) {
  for (let i = 0; i < count; i++) {
    const size = Phaser.Math.Between(3, 10);
    const b = scene.add.circle(0, 0, size, 0x67e8f9, 0.1).setDepth(depth);
    const loop = () => {
      b.setPosition(Phaser.Math.Between(30, GW - 30), Phaser.Math.Between(GH + 20, GH + 400));
      b.setAlpha(Phaser.Math.FloatBetween(0.04, 0.14));
      const destY = Phaser.Math.Between(-40, -200);
      const destX = b.x + Phaser.Math.Between(-60, 60);
      scene.tweens.add({
        targets: b,
        y: destY,
        x: destX,
        alpha: 0,
        duration: Phaser.Math.Between(6000, 14000),
        delay: Phaser.Math.Between(0, 8000),
        ease: 'Sine.easeInOut',
        onComplete: loop,
      });
    };
    loop();
  }
}

function maxTileOnGrid(grid) {
  let m = 0;
  for (let r = 0; r < GRID_SIZE; r++)
    for (let c = 0; c < GRID_SIZE; c++) m = Math.max(m, grid[r][c]);
  return m;
}

class BootScene extends Phaser.Scene {
  constructor(){ super('Boot'); }
  create(){
    Save.load();
    Sfx.init();
    Sfx.muted = !Save.data.sound;
    this._makeStarTextures();
    // Gradient strips reused by StyledButton (single draw call per button)
    makeLinearGradientTexture(this, 'grad_btn_primary', 400, 120, ['#22d3ee', '#0891b2', '#0e7490']);
    makeLinearGradientTexture(this, 'grad_btn_accent', 400, 120, ['#34d399', '#059669', '#047857']);
    makeLinearGradientTexture(this, 'grad_btn_muted', 400, 120, ['#334155', '#1e293b', '#0f172a']);
    this.scene.start('Menu');
  }
  _makeStarTextures(){
    const makeStarCanvas = (key, size, fillCol, shadowCol) => {
      const canvas = document.createElement('canvas');
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext('2d');
      const cx = size/2, cy = size/2;
      const outerR = size/2 - 2, innerR = outerR * 0.42;
      const pts = 5, step = Math.PI / pts;
      ctx.fillStyle = shadowCol;
      ctx.beginPath();
      for(let i=0;i<pts*2;i++){
        const R = i%2===0 ? outerR : innerR;
        const a = i * step - Math.PI/2;
        i===0 ? ctx.moveTo(cx+R*Math.cos(a), cy+1+R*Math.sin(a))
               : ctx.lineTo(cx+R*Math.cos(a), cy+1+R*Math.sin(a));
      }
      ctx.closePath(); ctx.fill();
      ctx.fillStyle = fillCol;
      ctx.beginPath();
      for(let i=0;i<pts*2;i++){
        const R = i%2===0 ? outerR : innerR;
        const a = i * step - Math.PI/2;
        i===0 ? ctx.moveTo(cx+R*Math.cos(a), cy+R*Math.sin(a))
               : ctx.lineTo(cx+R*Math.cos(a), cy+R*Math.sin(a));
      }
      ctx.closePath(); ctx.fill();
      this.textures.addCanvas(key, canvas);
    };
    makeStarCanvas('starOn', 64, '#38bdf8', '#0284c7');
    makeStarCanvas('starOff', 64, '#0c2744', '#071c2e');
  }
}

    g.fillStyle(C.surface, 0.9);
    g.fillRoundedRect(-w/2, -h/2, w, h, 14);
    g.lineStyle(1, C.border, 0.5);
    g.strokeRoundedRect(-w/2, -h/2, w, h, 14);
    const icon = this.add.text(0, 0, Sfx.muted ? '🔇' : '🔊', { fontSize: '26px' }).setOrigin(0.5);
    cont.add([g, icon]);
    const iw = w + pad * 2, ih = h + pad * 2;
    const hit = new Phaser.Geom.Rectangle(-iw / 2, -ih / 2, iw, ih);
    cont.setInteractive({
      hitArea: hit,
      hitAreaCallback: Phaser.Geom.Rectangle.Contains,
      useHandCursor: true,
    });
    let arm = false;
    cont
      .on('pointerover', () => {
        if (!arm) this.tweens.add({ targets: cont, scale: 1.08, duration: 100 });
      })
      .on('pointerout', () => {
        if (!arm) this.tweens.add({ targets: cont, scale: 1, duration: 100 });
      })
      .on('pointerdown', () => {
        arm = true;
        this.tweens.add({ targets: cont, scale: 0.94, duration: 70, ease: 'Cubic.easeIn' });
        Sfx.tap();
      })
      .on('pointerup', () => {
        if (!arm) return;
        arm = false;
        Sfx.muted = !Sfx.muted;
        Save.data.sound = !Sfx.muted;
        Save.write();
        icon.setText(Sfx.muted ? '🔇' : '🔊');
        this.tweens.add({ targets: cont, scale: 1.06, duration: 90, yoyo: true, ease: 'Quad.easeOut' });
      })
      .on('pointerupoutside', () => {
        arm = false;
        this.tweens.killTweensOf(cont);
        cont.setScale(1);
      });
  }
}

class GameScene extends Phaser.Scene {
  constructor(){ super('Game'); }

  create(){
    document.getElementById('game-canvas-host')?.classList.remove('gp-blur');
    setDomStartButtonVisible(false);

    this.cameras.main.fadeIn(450, 0, 0, 0);
    this.cameras.main.setBackgroundColor(C.gameField);

    this.BOARD_PAD = 10;
    this.CELL_GAP = 8;
    this.BOARD_SIZE = 640;
    this.CELL_SIZE = (this.BOARD_SIZE - this.BOARD_PAD*2 - this.CELL_GAP*(GRID_SIZE-1)) / GRID_SIZE;
    this.BOARD_X = (GW - this.BOARD_SIZE) / 2;
    this.BOARD_Y = 360;

    this.grid = emptyGrid();
    this.score = 0;
    this.moveCount = 0;
    this.gameWon = false;
    this.gameOver = false;
    this.keepPlaying = false;
    this.animating = false;
    this.undoStack = [];
    this._paused = false;

    addRandom(this.grid);
    addRandom(this.grid);

    spawnBubbles(this, 8, 1);

    this._drawVignette();
    this._drawBoard();

    this.tileContainers = {};
    this._renderAllTiles();

    this._hudRoot = this.add.container(0, 0).setDepth(4);
    this._buildHUD();

    this._setupInput();

    this.scene.launch('UI', { gameScene: this });
  }

  /** Soft edge darkening to keep eyes on the board (cheap overdraw, no extra textures). */
  _drawVignette() {
    const d = 0x001a22;
    const v = this.add.graphics().setDepth(1).setAlpha(0.4);
    v.fillStyle(d, 0.5);
    v.fillRect(0, 0, GW, 120);
    v.fillRect(0, GH - 160, GW, 160);
    v.fillStyle(d, 0.32);
    v.fillRect(0, 0, 40, GH);
    v.fillRect(GW - 40, 0, 40, GH);
  }

  _drawBoard(){
    const gfx = this.add.graphics().setDepth(2);
    gfx.fillStyle(C.primary, 0.08);
    gfx.fillRoundedRect(this.BOARD_X - 10, this.BOARD_Y - 10, this.BOARD_SIZE + 20, this.BOARD_SIZE + 20, 24);
    gfx.fillStyle(C.border, 1);
    gfx.fillRoundedRect(this.BOARD_X - 4, this.BOARD_Y - 4, this.BOARD_SIZE + 8, this.BOARD_SIZE + 8, 20);
    gfx.fillStyle(C.board, 1);
    gfx.fillRoundedRect(this.BOARD_X, this.BOARD_Y, this.BOARD_SIZE, this.BOARD_SIZE, 18);
    for(let r=0; r<GRID_SIZE; r++){
      for(let c=0; c<GRID_SIZE; c++){
        const {x: cx, y: cy} = this._cellPos(r, c);
        gfx.fillStyle(C.cell, 1);
        gfx.fillRoundedRect(cx - this.CELL_SIZE/2, cy - this.CELL_SIZE/2, this.CELL_SIZE, this.CELL_SIZE, 10);
        gfx.lineStyle(1, C.border, 0.35);
        gfx.strokeRoundedRect(cx - this.CELL_SIZE/2, cy - this.CELL_SIZE/2, this.CELL_SIZE, this.CELL_SIZE, 10);
      }
    }
  }

  _cellPos(r, c){
    const x = this.BOARD_X + this.BOARD_PAD + c * (this.CELL_SIZE + this.CELL_GAP) + this.CELL_SIZE/2;
    const y = this.BOARD_Y + this.BOARD_PAD + r * (this.CELL_SIZE + this.CELL_GAP) + this.CELL_SIZE/2;
    return {x, y};
  }

  _createTile(r, c, val, animate=false){
    const {x, y} = this._cellPos(r, c);
    const tc = tileColor(val);
    const w = this.CELL_SIZE, h = this.CELL_SIZE;
    const cont = this.add.container(x, y).setDepth(5);
    const rr = Phaser.Math.Clamp(w * 0.2, 9, 22);
    const edge = tc.edge != null ? tc.edge : 0x0a0a0a;

    const bg = this.add.graphics();
    bg.fillStyle(tc.bottom, 1);
    bg.fillRoundedRect(-w / 2, -h / 2, w, h, rr);
    const th = h * 0.52;
    bg.fillStyle(tc.top, 1);
    bg.fillRoundedRect(-w / 2, -h / 2, w, th, { tl: rr, tr: rr, bl: 0, br: 0 });
    bg.fillStyle(0xffffff, 0.12);
    bg.fillRoundedRect(-w / 2 + 2, -h / 2 + 2, w - 4, h * 0.28, { tl: Math.max(4, rr - 4), tr: Math.max(4, rr - 4), bl: 0, br: 0 });
    if (tc.premium) {
      bg.lineStyle(3, 0xfde047, 0.92);
      bg.strokeRoundedRect(-w / 2, -h / 2, w, h, rr);
    } else {
      bg.lineStyle(1, edge, 0.4);
      bg.strokeRoundedRect(-w / 2, -h / 2, w, h, rr);
    }

    const kids = [bg];
    if (tc.sparkle) {
      const gl = 10;
      const a = 0.62;
      const c1 = val >= 128 && val < 500 ? '#e0e7ff' : '#ffffff';
      [ [-w/2+gl, -h/2+8], [w/2-gl-2, -h/2+8], [-w/2+6, h/2-14] ].forEach(([sx, sy], i) => {
        const s = this.add.text(sx, sy, '✦', { fontSize: '11px', color: c1, fontStyle: '700' }).setOrigin(0, 0).setAlpha(i === 2 ? 0.4 : a);
        kids.push(s);
      });
    }
    if (val === 2048) {
      const cr = this.add.text(-w/2+8, -h/2+6, '♔', { fontSize: '13px', color: '#fbbf24' }).setOrigin(0, 0).setAlpha(0.85);
      kids.push(cr);
    }

    const fontSize = val >= 1024 ? '30px' : val >= 128 ? '36px' : '46px';
    const lightNum = (tc.text === '#0a0a0a' || tc.text === '#042f2a');
    const txt = this.add.text(0, 0, `${val}`, {
      fontSize, fontFamily: Theme.fontUI,
      fontStyle: '800', color: tc.text,
      stroke: lightNum ? 'rgba(255,255,255,0.35)' : 'rgba(0,0,0,0.35)',
      strokeThickness: 2,
    }).setOrigin(0.5);

    kids.push(txt);
    cont.add(kids);

    if(animate){
      cont.setScale(0);
      this.tweens.add({ targets: cont, scale: 1, duration: 220, ease: 'Back.easeOut', delay: 70 });
    }

    return cont;
  }

  _renderAllTiles(){
    Object.values(this.tileContainers).forEach(t => t.destroy());
    this.tileContainers = {};
    for(let r=0; r<GRID_SIZE; r++){
      for(let c=0; c<GRID_SIZE; c++){
        if(this.grid[r][c] !== 0){
          this.tileContainers[`${r}_${c}`] = this._createTile(r, c, this.grid[r][c]);
        }
      }
    }
  }

  _buildHUD() {
    const labelStyle = {
      fontFamily: Theme.fontUI,
      fontSize: '13px',
      color: '#7dd3fc',
      fontStyle: '700',
    };
    const valueStyle = {
      fontFamily: Theme.fontDisplay,
      fontSize: '34px',
      color: '#f0f9ff',
      fontStyle: '800',
    };

    // Header strip cards (score / timer / best) — balanced layout
    this.scoreHud = new AnimatedScore(this, 150, 118, 'SCORE', labelStyle, valueStyle);
    this.bestHud = new AnimatedScore(this, 570, 118, 'BEST', labelStyle, {
      ...valueStyle,
      fontSize: '32px',
      color: '#7dd3fc',
    });
    this.bestHud.snap(Save.data.bestScore);

    this.sessionTimer = new CircularSessionTimer(this, GW / 2, 118, 52);

    const movesLbl = this.add.text(GW / 2, 198, 'MOVES', {
      fontFamily: Theme.fontUI,
      fontSize: '12px',
      color: '#64748b',
      fontStyle: '700',
    }).setOrigin(0.5);
    this.movesText = this.add.text(GW / 2, 224, '0', {
      fontFamily: Theme.fontDisplay,
      fontSize: '28px',
      color: '#e2e8f0',
      fontStyle: '800',
    }).setOrigin(0.5);

    this.tweens.add({ targets: movesLbl, alpha: 0.5, duration: 2000, yoyo: true, repeat: -1, ease: 'Sine.easeInOut' });

    this.depthMeter = new DepthMeter(this, GW / 2, 312, 620, 22);
    this.depthMeter.setProgress01(this._ascentProgress(), this);

    this._hudRoot.add([this.scoreHud, this.bestHud, this.sessionTimer, movesLbl, this.movesText, this.depthMeter]);

    this.scoreHud.setTarget(0, false);

    this._hudRoot.setY(-24);
    this._hudRoot.setAlpha(0);
    this.tweens.add({
      targets: this._hudRoot,
      y: 0,
      alpha: 1,
      duration: 520,
      ease: 'Cubic.easeOut',
    });
  }

  _ascentProgress() {
    const m = maxTileOnGrid(this.grid);
    if (m <= 0) return 0;
    const log = Math.log2(m);
    return Phaser.Math.Clamp((log - 1) / (11 - 1), 0, 1);
  }

  update(time) {
    if (!this.sessionTimer || this._paused || this.gameOver) return;
    this.sessionTimer.updateFromTime(time);
  }

  _setupInput(){
    this.swipeStart = null;
    this.input.on('pointerdown', (p) => {
      if(this.animating || this.gameOver || this._paused) return;
      if(Sfx.ctx && Sfx.ctx.state === 'suspended') Sfx.ctx.resume();
      this.swipeStart = { x: p.x, y: p.y };
    });
    this.input.on('pointerup', (p) => {
      if(!this.swipeStart || this.animating || this.gameOver || this._paused) return;
      const dx = p.x - this.swipeStart.x;
      const dy = p.y - this.swipeStart.y;
      const absDx = Math.abs(dx), absDy = Math.abs(dy);
      this.swipeStart = null;
      if(Math.max(absDx, absDy) < 30) return;
      let dir;
      if(absDx > absDy) dir = dx > 0 ? 'right' : 'left';
      else dir = dy > 0 ? 'down' : 'up';
      this._doMove(dir);
    });

    this.input.keyboard.on('keydown', (e) => {
      if (e.key === 'Escape') {
        this._togglePause();
        return;
      }
      if(this.animating || this.gameOver || this._paused) return;
      const map = { ArrowLeft:'left', ArrowRight:'right', ArrowUp:'up', ArrowDown:'down',
                    a:'left', d:'right', w:'up', s:'down' };
      if(map[e.key]) this._doMove(map[e.key]);
      if(e.key === 'z' && (e.ctrlKey || e.metaKey)) this._undo();
    });
  }

  _togglePause() {
    if (this.gameOver) return;
    this._paused = !this._paused;
    const host = document.getElementById('game-canvas-host');
    if (host) host.classList.toggle('gp-blur', this._paused);
    this.registry.events.emit('gamePause', this._paused);
    if (this._paused) Sfx.tap();
  }

  setPaused(v) {
    this._paused = !!v;
    const host = document.getElementById('game-canvas-host');
    if (host) host.classList.toggle('gp-blur', this._paused);
    this.registry.events.emit('gamePause', this._paused);
  }

  _doMove(dir){
    if (this._paused) return;
    const prevGrid = cloneGrid(this.grid);
    const prevScore = this.score;
    const result = moveGrid(this.grid, dir);
    if(!result.moved){ Sfx.invalid(); return; }

    this.undoStack.push({ grid: prevGrid, score: prevScore, moveCount: this.moveCount });
    if(this.undoStack.length > 20) this.undoStack.shift();

    this.grid = result.grid;
    this.score += result.score;
    this.moveCount++;

    if(this.score > Save.data.bestScore){
      Save.data.bestScore = this.score;
      Save.write();
    }

    this.animating = true;
    this._animateMove(result, () => {
      const newCell = addRandom(this.grid);
      if(newCell){
        this.tileContainers[`${newCell.r}_${newCell.c}`] = this._createTile(newCell.r, newCell.c, this.grid[newCell.r][newCell.c], true);
      }
      this._updateHUD();

      if(!this.gameWon && !this.keepPlaying && hasWon(this.grid)){
        this.gameWon = true;
        this.time.delayedCall(300, () => this._showWin());
      } else if(!canMove(this.grid)){
        this.gameOver = true;
        Save.data.gamesPlayed++;
        Save.write();
        this.time.delayedCall(400, () => this._showGameOver());
      }
      this.animating = false;
    });

    if(result.mergedCells.length > 0) Sfx.merge();
    else Sfx.slide();
  }

  /**
   * Classic 2048-style motion: tiles slide from old cells to new, then board is rebuilt;
   * merged destinations get a short pop + bubbles.
   */
  _animateMove(result, onComplete) {
    Object.values(this.tileContainers).forEach((t) => { try { t.destroy(); } catch (e) {} });
    this.tileContainers = {};
    const tracks = result.tracks || [];
    const SLIDE_MS = 130;
    const EASE = 'Cubic.easeOut';
    const flyers = [];
    let pending = 0;
    const finishFly = () => {
      pending--;
      if (pending <= 0) this._afterSlideFlyers(result, onComplete, flyers);
    };

    for (const tr of tracks) {
      const p0 = this._cellPos(tr.sr, tr.sc);
      const p1 = this._cellPos(tr.er, tr.ec);
      const cont = this._createTile(tr.sr, tr.sc, tr.val, false);
      flyers.push(cont);
      if (p0.x !== p1.x || p0.y !== p1.y) {
        pending++;
        this.tweens.add({
          targets: cont,
          x: p1.x,
          y: p1.y,
          duration: SLIDE_MS,
          ease: EASE,
          onComplete: finishFly,
        });
      }
    }
    if (pending === 0) this._afterSlideFlyers(result, onComplete, flyers);
  }

  _afterSlideFlyers(result, onComplete, flyers) {
    flyers.forEach((f) => { try { f.destroy(); } catch (e) {} });
    this._renderAllTiles();
    const merged = result.mergedCells || [];
    for (const m of merged) {
      const key = `${m.r}_${m.c}`;
      const t = this.tileContainers[key];
      if (t) {
        t.setScale(0.22);
        this.tweens.add({ targets: t, scale: 1, duration: 175, ease: 'Back.easeOut' });
        this._spawnMergeBubbles(t.x, t.y);
      }
    }
    const delay = merged.length ? 95 : 35;
    this.time.delayedCall(delay, onComplete);
  }

  _spawnMergeBubbles(x, y){
    for(let i=0; i<5; i++){
      const size = Phaser.Math.Between(3, 7);
      const b = this.add.circle(x, y, size, 0x67e8f9, 0.45).setDepth(10);
      this.tweens.add({
        targets: b,
        y: y - Phaser.Math.Between(30, 80),
        x: x + Phaser.Math.Between(-30, 30),
        alpha: 0,
        scale: 0.3,
        duration: Phaser.Math.Between(400, 800),
        ease: 'Cubic.easeOut',
        onComplete: () => b.destroy(),
      });
    }
  }

  _updateHUD(){
    const merged = this.scoreHud && this.scoreHud.target !== this.score;
    this.scoreHud.setTarget(this.score, !!merged);
    this.bestHud.snap(Save.data.bestScore);
    this.movesText.setText(`${this.moveCount}`);
    this.depthMeter.setProgress01(this._ascentProgress(), this);
  }

  _undo(){
    if(this.undoStack.length === 0 || this.gameOver || this._paused) return;
    const prev = this.undoStack.pop();
    this.grid = prev.grid;
    this.score = prev.score;
    this.moveCount = prev.moveCount;
    this._renderAllTiles();
    this._updateHUD();
    Sfx.undo();
  }

  _showWin(){
    Sfx.victory();
    const overlay = this.add.rectangle(GW/2, GH/2, GW, GH, 0x020617, 0).setDepth(50).setInteractive();
    this.tweens.add({ targets: overlay, fillAlpha: 0.72, duration: 320 });

    const panel = this.add.container(GW/2, GH/2 + 50).setDepth(51).setAlpha(0);
    const panelBg = this.add.graphics();

    panelBg.fillRoundedRect(-260, -210, 520, 420, 22);
    panelBg.lineStyle(2, C.primary, 0.45);
    panelBg.strokeRoundedRect(-260, -210, 520, 420, 22);
    panelBg.fillStyle(C.primary, 0.06);
    panelBg.fillRoundedRect(-258, -208, 516, 200, {tl:20,tr:20,bl:0,br:0});

    const titleTxt = this.add.text(0, -150, 'SURFACED!', {

    }).setOrigin(0.5);

    const scoreTxt = this.add.text(0, -68, `Score  ${this.score}`, {
      fontSize: '30px', fontFamily: Theme.fontUI,
      fontStyle: '700', color: '#f0f9ff',
    }).setOrigin(0.5);

    const movesTxt = this.add.text(0, -22, `Moves  ${this.moveCount}`, {
      fontSize: '22px', fontFamily: Theme.fontUI,
      color: '#94a3b8',
    }).setOrigin(0.5);

    const cx = GW / 2, cy = GH / 2;
    const keepBtn = new StyledButton(this, cx, cy + 78, 240, 58, 'grad_btn_primary', 'DIVE DEEPER', {
      fontFamily: Theme.fontDisplay,

  _showGameOver(){

    actBg.lineStyle(1, C.border, 0.4);

      this.gameScene._undo();
    });

      this.gameScene.setPaused(false);

        Save.write();

      });

    const dim = this.add.rectangle(GW / 2, GH / 2, GW, GH, 0x020617, 0.55).setInteractive();

    card.fillRoundedRect(pcx - 200, pcy - 130, 400, 260, 20);
    card.lineStyle(2, C.primary, 0.4);
    card.strokeRoundedRect(pcx - 200, pcy - 130, 400, 260, 20);

      fontFamily: Theme.fontDisplay,
      fontSize: '36px',
      fontStyle: '800',
      color: '#e0f2fe',

      fontFamily: Theme.fontDisplay,
      fontSize: '20px',
      color: '#020617',
      fontStyle: '800',
    }, () => {

    });
    const menu = new StyledButton(this, pcx, pcy + 92, 260, 50, 'grad_btn_muted', 'MAIN MENU', {
      fontFamily: Theme.fontUI,
      fontSize: '17px',

    }, () => {
      this.gameScene.setPaused(false);
      this._pauseLayer.setVisible(false);
      document.getElementById('game-canvas-host')?.classList.remove('gp-blur');

      this.gameScene.cameras.main.once('camerafadeoutcomplete', () => {
        this.scene.stop();
        this.gameScene.scene.start('Menu');
      });
    });
    resume.setDepth(101);
    menu.setDepth(101);
    this._pauseLayer.add([dim, card, pt, resume, menu]);

    this._syncPauseOverlay = (p) => { this._pauseLayer.setVisible(!!p); };
    this.registry.events.on('gamePause', this._syncPauseOverlay);
    this.events.once('shutdown', () => {
      this.registry.events.off('gamePause', this._syncPauseOverlay);
    });
  }

  /**
   * Icon action chip: gradient fill + glow on hover (microinteraction).
   * Returns { container, icon } so callers can update emoji text safely.
   */
  _actionBtn(x, y, size, icon, label, callback){
    const cont = this.add.container(x, y).setDepth(2);
    const bg = this.add.graphics();
    const draw = (glow = false) => {
      bg.clear();
      if (glow) bg.fillStyle(C.primary, 0.12);
      else bg.fillStyle(C.cell, 1);
      bg.fillRoundedRect(-size/2 - 2, -size/2 - 2, size + 4, size + 4, 14);
      bg.fillStyle(C.surface, 1);
      bg.fillRoundedRect(-size/2, -size/2, size, size, 12);
      bg.lineStyle(1, C.borderLt, glow ? 0.9 : 0.45);
      bg.strokeRoundedRect(-size/2, -size/2, size, size, 12);
    };
    draw(false);
    const iconTxt = this.add.text(0, -5, icon, {
      fontSize: '28px', fontFamily: Theme.fontUI,
    }).setOrigin(0.5);
    const labelTxt = this.add.text(0, size / 2 + 14, label, {
      fontSize: '12px', fontFamily: Theme.fontUI,
      fontStyle: '700', color: '#7dd3fc',
    }).setOrigin(0.5);
    cont.add([bg, iconTxt, labelTxt]);
    const hitH = size + 36;
    const hit = new Phaser.Geom.Rectangle(-size / 2, -size / 2 - 5, size, hitH + 8);
    cont.setInteractive({
      hitArea: hit,
      hitAreaCallback: Phaser.Geom.Rectangle.Contains,
      useHandCursor: true,
    });
    let pressed = false;
    cont
      .on('pointerover', () => {
        if (pressed) return;
        draw(true);
        this.tweens.add({ targets: cont, scale: 1.08, duration: 90, ease: 'Cubic.easeOut' });
      })
      .on('pointerout', () => {
        if (pressed) return;
        draw(false);
        this.tweens.add({ targets: cont, scale: 1, duration: 100 });
      })
      .on('pointerdown', () => {
        pressed = true;
        this.tweens.add({ targets: cont, scale: 0.92, duration: 55, ease: 'Cubic.easeIn' });
        Sfx.tap();
      })
      .on('pointerup', () => {
        if (!pressed) return;
        pressed = false;
        draw(false);
        this.tweens.add({ targets: cont, scale: 1.05, duration: 80, yoyo: true });
        callback();
      })
      .on('pointerupoutside', () => {
        if (!pressed) return;
        pressed = false;
        draw(false);
        this.tweens.killTweensOf(cont);
        cont.setScale(1);
      });
    return { container: cont, icon: iconTxt };
  }
}

/**
 * One listener (GameScene used to add another per run).
 * Do NOT use loop.stop()/start() for tabs: start() is TimeStep.start(callback) — with no arg it sets
 * this.callback=undefined, then next step() throws "this.callback is not a function" (phaser col ~80333).
 * Use sleep/wake: they pause the RAF and keep the game step callback.
 */
function syncPhaserLoopToDocumentVisibility() {
  const g = window.game;
  if (!g?.loop) return;
  const hint = document.getElementById('gp-tab-pause-hint');
  if (hint) {
    hint.classList.toggle('gp-tab-pause-hint--show', !!document.hidden);
    if (document.hidden) hint.removeAttribute('hidden');
    else hint.setAttribute('hidden', '');
  }
  const loop = g.loop;
  try {
    if (document.hidden) {
      if (typeof loop.sleep === 'function') loop.sleep();
    } else {
      if (typeof loop.wake === 'function') loop.wake();
      try {
        const p = Sfx.ctx && Sfx.ctx.resume && Sfx.ctx.resume();
        if (p && typeof p.then === 'function') p.catch(function () {});
      } catch (e) {}
    }
  } catch (e) {
    // ignore
  }
}
document.addEventListener('visibilitychange', syncPhaserLoopToDocumentVisibility);
